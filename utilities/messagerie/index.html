<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; }
    #messages { height: 400px; overflow-y: auto; border: 1px solid #ccc;
                padding: 1rem; margin-bottom: 1rem; border-radius: 8px; }
    .msg { margin: 8px 0; }
    .msg.mine { text-align: right; }
    .msg span { display: inline-block; padding: 8px 12px;
                border-radius: 16px; background: #eee; }
    .msg.mine span { background: #0084ff; color: white; }
    .seen { font-size: 11px; color: #999; }
    #input-area { display: flex; gap: 8px; }
    input { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #ccc; }
    button { padding: 8px 16px; border-radius: 8px; background: #0084ff;
             color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <div id="messages"></div>
  <div id="input-area">
    <input id="msg-input" placeholder="Type a message..." />
    <button onclick="sendMessage()">Send</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // Get user IDs from URL: ?userId=1&otherId=2
    const params   = new URLSearchParams(window.location.search);
    const MY_ID    = parseInt(params.get('userId'));
    const OTHER_ID = parseInt(params.get('otherId'));

    const socket = io({ query: { userId: MY_ID } });

    const messagesEl = document.getElementById('messages');

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function renderMsg(msg) {
      const div = document.createElement('div');
      div.className = 'msg' + (msg.ID_Expediteur == MY_ID ? ' mine' : '');
      div.dataset.id = msg.ID;
      div.innerHTML = `<span>${msg.contenue}</span>`;
      if (msg.lue)
        div.innerHTML += '<div class="seen">Seen</div>';
      messagesEl.appendChild(div);
      scrollToBottom();
    }

    // Load history on connect
    socket.on('history', (msgs) => {
      msgs.forEach(renderMsg);
      scrollToBottom();
    });

    // Receive new message
    socket.on(`msg_${MY_ID}`, (msg) => {
      renderMsg(msg);
      // If message is from the other person, mark it as seen
      if (msg.ID_Expediteur !== MY_ID) {
        socket.emit('mark_seen', { messageId: msg.ID, ID_Destinataire: MY_ID });
      }
    });

    // Show "Seen" when our message is seen by the other person
    socket.on(`seen_${MY_ID}`, ({ messageId }) => {
      const el = document.querySelector(`[data-id="${messageId}"]`);
      if (el && !el.querySelector('.seen'))
        el.innerHTML += '<div class="seen">Seen</div>';
    });

    function sendMessage() {
      const input = document.getElementById('msg-input');
      if (!input.value.trim()) return;
      socket.emit('send_message', {
        ID_Expediteur:   MY_ID,
        ID_Destinataire: OTHER_ID,
        contenue:        input.value.trim(),
      });
      input.value = '';
    }

    document.getElementById('msg-input')
      .addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });
  </script>
</body>
</html>
