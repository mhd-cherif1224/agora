<!-- Table d'Admin -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/table-admin.css">
    <title>Table d'Admin</title>
</head>
<body>


    
        <header>
            <nav class="admin-navbar">
                <button class="MyBtns" id="tab-Admin"><a href="../html/table-admin.html">Table d'Admin</a></button>
                <details class="dropdown">
                    <summary class="MyBtns">Table d'Utilisateurs</summary>

                    <div class="dropdown-content">
                        <a href="../html/table-etudiant.html">Table d'Étudiants</a>
                        <a href="../html/table-enseignant.html">Table d'Enseignants</a>
                    </div>
                </details>
                <button class="MyBtns"><a href="../html/table-post.html">Table de Posts</a></button>
                <button id="deconnexion-btn"><a href="../html/login-admin.html">Déconnexion</a></button>
            </nav>
        </header>


    <div class="container">

        <table id="adminTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Email</th>
                    <th>Mot de passe</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>1</td>
                    <td>Email1</td>
                    <td>Motdepasse1</td>
                </tr>

                <tr>
                    <td>2</td>
                    <td>Email2</td>
                    <td>Motdepasse2</td>
                </tr>
            </tbody>

        </table>


        <div class="buttons-container">
            <button class="buttons" id="deleteBtn">
                <i class="fa-solid fa-minus-square"></i>
                Supprimer un Admin
            </button>
            <button class="buttons" id="addBtn">
                <i class="fa-solid fa-plus-square"></i>
                Ajouter un Admin
            </button>
        </div>


        <!-- MODAL -->

        <div id="modal" class="modal">

            <div class="modal-content">
                <div class="modal-header">
                    <p>Ajouter un Admin</p>
                    <span class="close">&times;</span>
                </div>

                <div class="input-row">

                    <div class="input-group">
                        <label for="emailInput">Email</label>
                        <input type="email" id="emailInput">
                    </div>

                    <div class="input-group">
                        <label for="passwordInput">Mot de passe</label>
                        <input type="password" id="passwordInput">
                    </div>

                </div>

                <br>

                <div class="modal-buttons">
                    <button class="buttons" id="confirmAdd">
                        <i class="fa-solid fa-plus-square vert">  </i>
                        Ajouter
                    </button>
                    <button class="buttons" id="cancelAdd">Annuler</button>
                </div>

            </div>

        </div>


        <div id="notification"></div>

        <!-- MODAL CONFIRMATION SUPPRESSION -->
        <div id="confirmModal" class="modal">
            <div class="modal-content confirm-modal">
                <div class="modal-header">
                    <p id="confirmTitle">Confirmer la suppression</p>
                    <span class="closeConfirm">&times;</span>
                </div>
                <div class="modal-body">
                    <p id="confirmMessage">Êtes-vous sûr de vouloir supprimer cet admin ?</p>
                </div>
                <div class="modal-buttons">
                    <button class="buttons" id="confirmYes">
                        <i class="fa-solid fa-minus-square rouge"></i>
                        Supprimer 
                    </button>
                    <button class="buttons" id="confirmNo">Annuler</button>
                </div>
            </div>
        </div>

    </div>
    


    <script src="../js/table-admin.js"></script>
</body>
</html>
