<!-- TABLE DES SERVICES -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/table-admin.css">
    <title>Table des Services</title>
</head>
<body>

    <!-- NAVBAR -->
    <header class="navbar">
        <div class="nav-logo" onclick="window.location.href='../html/home-page-admin.html'">
            <img src="../images/logo.svg" alt="">
        </div>

        <nav class="navbar-links">
            <a href="../html/table-admin.html" class="nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                Table d'Admins
            </a>
            <a href="../html/table-utilisateur.html" class="nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Table d'Utilisateurs
            </a>
            <a href="../html/table-service.html" class="nav-link active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
                Table des Services
            </a>
            <a href="../html/table-categorie.html" class="nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                Table des Catégories
            </a>
        </nav>

        <div class="navbar-right">
            <button id="toggleBtn">🌙</button>
            <a href="../html/login-admin.html" class="btn-logout" id="logout-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Déconnexion
            </a>
        </div>
    </header>

    <div class="container">

        <table id="serviceTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Titre</th>
                    <th>Description</th>
                    <th>DatePublication</th>
                    <th>StatutService</th>
                    <th>Prix</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>Aide Java</td>
                    <td>Je peux aider en Java</td>
                    <td>01/05/2026</td>
                    <td>Disponible</td>
                    <td>1000</td>
                </tr>
            </tbody>
        </table>

        <div class="buttons-container">
            <button class="buttons" id="deleteBtn">
                <i class="fa-solid fa-minus-square"></i>
                Supprimer un Service
            </button>
        </div>


        <!-- MODAL CONFIRMATION SUPPRESSION -->

        <div id="confirmModal" class="modal">
            <div class="modal-content confirm-modal">

                <div class="modal-header">
                    <p>Confirmer la suppression</p>
                    <span class="closeConfirm">&times;</span>
                </div>

                <div class="modal-body">
                    <p>Êtes-vous sûr de vouloir supprimer ce service ?</p>
                </div>

                <div class="modal-buttons">
                    <button class="buttons" id="confirmYes">
                        <i class="fa-solid fa-minus-square rouge"></i>
                        Supprimer
                    </button>
                    <button class="buttons" id="confirmNo">Annuler</button>
                </div>

            </div>
        </div>

        <div id="notification"></div>
        
    </div>

    <script src="../js/table-service.js"></script>
</body>
</html>
