<!-- TABLE DES CATEGORIES -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <script>
            (function () {
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark-theme');
                }
            })();
        </script>
    <link rel="stylesheet" href="../css/table-admin.css">
    <title>Table des catégories</title>
</head>
<body>

    <header>
        <nav class="admin-navbar">

            <button id="adminTableBtn" class="MyBtns">
                <a href="../html/table-admin.html">Table d'Admins</a>
            </button>

            <button class="MyBtns">
                <a href="../html/table-utilisateur.html">Table d'Utilisateurs</a>
            </button>

            <button class="MyBtns">
                <a href="../html/table-service.html">Table des Services</a>
            </button>

            <button class="MyBtns">
                <a href="../html/table-categorie.html">Table des Catégories</a>
            </button>

            <button id="deconnexion-btn">
                <a href="../html/login-admin.html">Déconnexion</a>
            </button>

        </nav>
    </header>

    <div class="container">

        <table id="categorieTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nom</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>Nom</td>
                </tr>
            </tbody>
        </table>

        <div class="buttons-container">
            <button class="buttons" id="deleteBtn">
                <i class="fa-solid fa-minus-square"></i>
                Supprimer une catégorie
            </button>
            <button class="buttons" id="editBtn">
                <i class="fa-solid fa-edit"></i>
                Modifier une catégorie
            </button>
            <button class="buttons" id="addBtn">
                <i class="fa-solid fa-plus-square"></i>
                Ajouter une catégorie
            </button>
        </div>


        <!-- MODAL AJOUT -->

        <div id="modal" class="modal">
            <div class="modal-content" style="height:auto;width:500px;">

                <div class="modal-header">
                    <p>Ajouter une catégorie</p>
                    <span class="close">&times;</span>
                </div>
                
                <div class="input-row">
                    
                    <div class="input-group">
                        <label>Nom<span class="mandatory-star">*</span></label>
                        <input type="text" id="nomInputAdd">
                    </div>
                </div>

                <br>

                <div class="modal-buttons">
                    <button class="buttons" id="confirmAdd">
                        <i class="fa-solid fa-plus-square vert"></i>
                        Ajouter
                    </button>
                    <button class="buttons" id="cancelAdd">Annuler</button>
                </div>

            </div>
        </div>


        <!-- MODAL MODIFIER -->

        <div id="modifierModal" class="modal">
            <div class="modal-content" style="height:auto;width:500px;">

                <div class="modal-header">
                    <p>Modifier une catégorie</p>
                    <span class="closeModifier">&times;</span>
                </div>

                <div class="input-row">
                    
                    <div class="input-group">
                        <label>Nom<span class="mandatory-star">*</span></label>
                        <input type="text" id="nomInput">
                    </div>
                </div>

                <div class="modal-buttons">
                    <button class="buttons" id="confirmModifier">
                        <i class="fa-solid fa-edit vert"></i>
                        Modifier
                    </button>
                    <button class="buttons" id="cancelModifier">Annuler</button>
                </div>

            </div>
        </div>


        <!-- MODAL CONFIRMATION SUPPRESSION -->

        <div id="confirmModal" class="modal">
            <div class="modal-content confirm-modal">

                <div class="modal-header">
                    <p>Confirmer la suppression</p>
                    <span class="closeConfirm">&times;</span>
                </div>

                <div class="modal-body">
                    <p>Êtes-vous sûr de vouloir supprimer cette catégorie ?</p>
                </div>

                <div class="modal-buttons">
                    <button class="buttons" id="confirmYes">
                        <i class="fa-solid fa-minus-square rouge"></i>
                        Supprimer
                    </button>
                    <button class="buttons" id="confirmNo">Annuler</button>
                </div>

            </div>
        </div>

        <div id="notification"></div>
        <div id="toggleBtnContainer">
            <button id="toggleBtn">🌙</button>
        </div>
    </div>

    <script src="../js/table-categorie.js"></script>
</body>
</html>
