<!-- Landing page (Accueil public) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home page</title>
    <!-- Font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/landing-page.css">
</head>
<body>

    <!-- ================= HEADER ================= -->
    <header>
        <div class="logo">LOGO</div>

        <div class="search-bar">
            <input type="text" placeholder="Recherchez un service...">
        </div>
        <nav>
            <ul>
                <li>
                    <i class="fa-solid fa-house"></i>
                </li>

                <li>
                    <i class="fa-solid fa-message"></i>
                </li>

                <li>
                    <i class="fa-solid fa-bell"></i>
                </li>

                <li>
                    <i class="fa-solid fa-user"></i>
                </li>
            </ul>
        </nav>

    </header>

    <!-- ================= MAIN ================= -->
    <main>
        <!-- ============= CENTER FEED =============== -->
        <section class="feed">
            <!-- Create Post -->
             <div class="create-post">
                <div class="message-box">
                    <input type="text" placeholder="Rédigez un post, posez une question...">
                    <div class="post-actions">
                        <button>
                            <i class="fa-solid fa-image"></i>
                        </button>
                        <button class="msg">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                        <button>
                            <i class="fa-solid fa-calendar-days"></i>
                        </button>
                    </div>
                </div>
                
                <!-- Post Exemple -->
                <article class="post">
                    <div class="post-header">
                        <img src="/images/profile.jpg" alt="profile" id="profile">
                        <div>
                            <h4 id="nom">Mehdi Cherif</h4>
                            <p>Étudiant en informatique</p>
                        </div>
                    </div>
                    <p>
                        Je cherche quelqu’un qui fait du développement web
                    pour lui proposer un job freelance.
                    </p>
                    <img src="/images/post-image.png" alt="post image"  height="500">
                    <div class="post-footer">
                        <button><i class="fa-solid fa-thumbs-up"></i><span>J’aime</span></button>
                        <button><i class="fa-solid fa-comment"></i><span>Commenter</span></button>
                        <button><i class="fa-solid fa-share"></i><span>Partager</span></button>

                    </div>
                </article>

                <!-- ===== RIGHT SIDEBAR ===== -->
                <aside class="sidebar">
                    <h3>Connaissez-vous ?</h3>

                    <div class="suggestion">
                        <p>Mehdi Cherif</p>
                        <button class="MyBtns">Suivre</button>
                    </div>

                    <div class="suggestion">
                        <p>Chaima Ouk</p>
                        <button class="MyBtns">Suivre</button>
                    </div>
                </aside>
             </div>
        </section>
    </main>
   
</body>
</html>
