<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vérification du code</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="../css/code-verification.css"/>
</head>
<body>
<div class="card" id="card">

  <!-- ── Header ── -->
  <div class="top">
    <a href="send-code.html" class="back-icon" title="Retour">
      <i class="fa-solid fa-chevron-left" id="back"></i>
    </a>
    <div class="progress-wrap">
      <div class="progress-bar-fill"></div>
    </div>
  </div>

  <!-- ── Main view ── -->
  <div class="main-view" id="mainView">
    <h1>Vérification</h1>
    <p class="subtitle">Un code à 6 chiffres a été envoyé à</p>
    <p class="email-label" id="emailDisplay">votre adresse e-mail</p>

    <div class="alert" id="alertBox"></div>

    <div class="otp-wrapper" id="otpWrapper">
      <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
      <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
      <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
      <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
      <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
      <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
    </div>

    <!-- Timer ring -->
    <div class="timer-section">
      <div class="timer-ring-wrap">
        <svg class="timer-ring" width="48" height="48" viewBox="0 0 48 48">
          <circle class="ring-track" cx="24" cy="24" r="18"/>
          <circle class="ring-fill" id="ringFill" cx="24" cy="24" r="18"/>
        </svg>
        <div class="ring-label" id="ringLabel">1:00</div>
      </div>
      <div class="timer-text">
        Code valide pendant&nbsp;<span id="timerTxt">2:00</span>
        &nbsp;—&nbsp;
        <button class="resend-btn" id="resendBtn" onclick="resendCode()">Renvoyer</button>
      </div>
    </div>

    <div class="btn-container">
      <button class="btn" id="verifyBtn" onclick="handleVerify()">
        <div class="spinner"></div>
        <span class="btn-text">VÉRIFIER</span>
      </button>
    </div>
  </div>
</div>

<!-- ── Success modal ── -->
<div class="modal" id="successModal">
  <div class="modal-content">
    <div class="modal-header">
      <p>Succès</p>
      <span class="close" onclick="closeModal()">&#x2715;</span>
    </div>
    <div class="modal-body">
      <div class="success-circle-modal">✓</div>
      <h2>Code vérifié !</h2>
      <p>Votre identité a été confirmée.<br/>Vous allez être redirigé vers la réinitialisation du mot de passe.</p>
    </div>
  </div>
</div>

<div id="notification"></div>

<script src="../js/code-verification.js"></script>
</body>
</html>
