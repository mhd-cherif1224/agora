<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Résultats — AGORA</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="resultat-recherche.css">
  <link rel="stylesheet" href="../homepage/css/base.css">
  <link rel="stylesheet" href="../homepage/css/nav.css">
  <link rel="stylesheet" href="../homepage/css/sidebar.css">
  <link rel="stylesheet" href="../homepage/css/feed.css">
 
</head>
<body>

<!-- ═══ NAV ═══ -->
<nav>
  <div class="nav-logo" onclick="window.location.href='../homepage/home-page.html'">
    <img src="../../images/logo.svg" width="100px" alt="">
  </div>

  <div class="nav-search">
    <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="navSearchInput"placeholder="recherchez un service, un produit..." onkeydown="if(event.key==='Enter' && this.value.trim()) window.location.href='resultat-recherche.html?q='+encodeURIComponent(this.value.trim())">
  </div>

  <div class="nav-icons">
    <button class="nav-icon-btn" title="Accueil" onclick="window.location.href='../homepage/home-page.html'">
      <svg viewBox="0 0 24 24" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
    </button>

    <button class="nav-icon-btn" id="navChat" title="Messages" onclick="window.location.href='../messagerie/messagerie.html'">
      <svg viewBox="0 0 24 24" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <span class="notif-dot"></span>
    </button>


    <button class="nav-icon-btn" title="Notifications">
      <svg viewBox="0 0 24 24" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      <span class="notif-dot"></span>
    </button>

    <button class="nav-icon-btn" title="Catégories"  onclick="window.location.href='../../UI/categorie-services/categorie-services.html'">
      <svg viewBox="0 0 24 24" stroke-width="2">
        <path d="M20 13L11 22L2 13V4h9l9 9z"/>
        <circle cx="15" cy="8" r="1"/>
      </svg>
    </button>

    <div class="nav-divider"></div>
      <div class="nav-avatar" id="navAvatar" onclick="window.location.href='mon-profil.html'" title="Mon Profil">
        <img id="navAvatarImg" alt="avatar" style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:none;">
        <span id="navAvatarLetter">M</span>
      </div>

      <button class="nav-menu-btn" id="navMenuBtn">
        <span></span><span></span><span></span>
      </button>

      <!-- Dropdown menu -->
      <div class="nav-dropdown" id="navDropdown" hidden>
        <a class="nav-dropdown-item" id="btnDeconnexion">
          <svg viewBox="0 0 24 24" stroke-width="2" fill="none">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16,17 21,12 16,7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Déconnexion
        </a>
        <a class="nav-dropdown-item danger" id="btnSupprimerCompte">
          <svg viewBox="0 0 24 24" stroke-width="2" fill="none">
            <polyline points="3,6 5,6 21,6"/>
            <path d="M19,6l-1,14a2 2 0 01-2 2H8a2 2 0 01-2-2L5,6"/>
            <path d="M10,11v6M14,11v6"/>
            <path d="M9,6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
          </svg>
          Supprimer le compte
        </a>
      </div>

    </div><!-- /nav-icons -->
</nav>

<!-- ═══ LAYOUT ═══ -->
<div class="layout">

  <!-- ════ MAIN COL ════ -->
  <div class="main-col">

    <!-- PEOPLE CAROUSEL -->
    <div class="people-carousel">
    </div>

    <!-- SORT BAR -->
    <div class="sort-bar">
      <span class="sort-label">classer par :</span>
      <select class="sort-select">
        <option value="recent">recent</option>
        <option value="popular">populaire</option>
      </select>
    </div>

    <!-- RESULTS HEADER -->
    <div class="results-header">
      <div>
        <div class="results-title">Les publications trouvees</div>
        <div class="results-count"></div>
      </div>
    </div>

    <!-- ═══ FEED ═══ -->
    <div class="feed">

    </div><!-- /feed -->

  </div><!-- /main-col -->

  <!-- ════ SIDEBAR ════ -->
  <!-- ════════════ SIDEBAR ════════════ -->
  <div class="sidebar">
      <div class="suggest-card " id="suggestCard">
        <h3>CONNAISSEZ - VOUS ?</h3>
        <!-- LIST OF ALL USERS -->
        <div class="suggest-list" id="usersList">
          <!-- Populated by JS -->
        </div>
      </div>
        <!-- ALL LIST (hidden by default) -->
        
        <p class="footer-note">© 2026 AGORA . All rights reserved.</p>
      </div>

</div><!-- /layout -->

<!-- FAB -->
<div class="fab-bar">
    <!-- Message shortcut: ATTNEKKES APRES -->
    <button class="fab-btn" title="Messagerie" id="fabMsgBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
    </button>

    <!-- Help -->
    <button class="fab-btn" title="Aide" id="fabHelpBtn">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="22" height="22">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8"/>
            <path d="M12 17.5v.5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M12 14c0-1.5 1.5-2 2.2-3.2a2.8 2.8 0 10-4.9-1.9"
                stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>
  </div>

  <!-- notification toast -->
<div id="notification" style="display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1714;color:#fff;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;padding:12px 24px;border-radius:30px;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:9999;align-items:center;gap:8px;"></div>

  <!-- ══ MODAL SUPPRESSION ══ -->
  <div id="modalSupprimer" hidden>
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="modal-box">
      <div class="modal-icon">🗑️</div>
      <h3 class="modal-title">Supprimer le compte</h3>
      <p class="modal-text">Cette action est <strong>irréversible</strong>.</p>
      <div class="modal-actions">
        <button class="modal-btn cancel" id="modalCancel">Annuler</button>
        <button class="modal-btn confirm" id="modalConfirm">Oui, supprimer</button>
      </div>
    </div>
  </div>

<script src="resultat-recherche.js"></script>
<script src="../homepage/js/sidebar.js"></script>

</body>
</html>
